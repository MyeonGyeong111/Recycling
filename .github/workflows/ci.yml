name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 1. 빌드 단계: GitHub 서버(ubuntu-latest)에서 실행
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/recycling-api:latest
          # 빌드 속도를 높이기 위한 캐시 설정
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/recycling-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/recycling-api:buildcache,mode=max

  # 2. 배포 단계: 사용자님의 노트북(self-hosted)에서 실행
  deploy:
    name: Deploy to Self-Hosted Runner
    needs: build-and-push
    if: github.event_name != 'pull_request'
    # 'self-hosted' 라벨이 붙은 노트북 러너에서 실행됩니다.
    runs-on: self-hosted

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull & Run New Container
        # 윈도우 환경이므로 모든 sudo를 제거했습니다.
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/recycling-api:latest
          
          # 기존 컨테이너가 있으면 지우고, 없어도 에러 없이 진행하도록 설정
          docker rm -f recycling_api-api-1 || echo "No existing container to remove"
          
          # 새로운 컨테이너 실행
          docker run -d \
            --name recycling_api-api-1 \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/recycling-api:latest
            
          # 사용하지 않는 오래된 이미지 정리
          docker image prune -f