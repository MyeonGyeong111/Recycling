name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/recycling-api:latest

  deploy:
    name: Deploy to Self-Hosted Runner
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Pull & Run New Container
        # 윈도우 전용 쉘 설정
        shell: powershell
        run: |
          $IMAGE_NAME = "${{ secrets.DOCKERHUB_USERNAME }}/recycling-api:latest"
          docker pull $IMAGE_NAME
          
          # 컨테이너 존재 확인 후 삭제 (PowerShell 문법)
          $container = docker ps -a -q --filter "name=recycling_api-api-1"
          if ($container) {
              docker rm -f recycling_api-api-1
          }

          # 백틱(`) 기호를 사용한 줄바꿈
          docker run -d `
            --name recycling_api-api-1 `
            -p 8000:8000 `
            --restart unless-stopped `
            $IMAGE_NAME
            
          docker image prune -f
